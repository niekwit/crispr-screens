name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install snakefmt
        run: pip install snakefmt==2.0.3
      - name: Formatting
        run: snakefmt --check .

  Linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Lint workflow
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_mageck_test
          snakefile: workflow/Snakefile
          snakemake-version: 8.25.5
          args: "--lint"

  Testing:
    runs-on: ubuntu-latest
    needs:
      - Linting
      - Formatting
    steps:
      - uses: actions/checkout@v2

      - name: Test workflow MAGeCK test
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_mageck_test
          snakefile: workflow/Snakefile
          snakemake-version: 8.25.5
          args: "--use-conda --show-failed-logs --cores 3 --conda-cleanup-pkgs cache"

      - name: Test report
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_mageck_test
          snakefile: workflow/Snakefile
          snakemake-version: 8.25.5
          args: "--report report.zip"

      - name: Test workflow MAGeCK mle
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_mageck_mle
          snakefile: workflow/Snakefile
          snakemake-version: 8.25.5
          args: "--use-conda --show-failed-logs --cores 3 --conda-cleanup-pkgs cache"
