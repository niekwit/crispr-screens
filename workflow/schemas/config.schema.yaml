$schema: "http://json-schema.org/draft-06/schema#"

description: Snakemake configuration file

type: object

properties:
  lib_info:
    type: object
    properties:
      library_file:
        type: string
        description: Path to the library file with sgRNA annotations

      species:
        type: string
        description: Species of the library (e.g., human, mouse)

    required:
      - library_file
      - species

  cutadapt_args:
    type: string
    description: Extra arguments for cutadapt

  csv:
    type: object
    properties:
      name_column:
        type: integer
        description: Column number with sgRNA names

      sequence_column:
        type: integer
        description: Column number with sgRNA sequences

      gene_column:
        type: integer
        description: Column number with gene names

    required:
      - name_column
      - sequence_column

  mismatch:
    type: integer
    description: Mismatches allowed during alignment

  stats:
    type: object
    properties:

      crisprcleanr:
        type: object
        properties:
          library_name:
            type: string
            description: sgRNA library name (e.g., AVANA_Library, Brunello_Library, etc.)

          min_reads:
            type: integer
            description: Keep sgRNAs with at least this many reads in control sample

        required:
          - library_name
          - min_reads

      bagel2:
        type: object
        properties:
          run:
            type: boolean
            description: Perform bagel2 analysis

          custom_gene_lists:
            type: object
            properties:
              essential_genes:
                type: string
                description: Path to custom gene list for bagel2 analysis
              non_essential_genes:
                type: string
                description: Path to custom gene list for bagel2 analysis

          extra_args:
            type: object
            properties:
              bf:
                type: string
                description: Extra arguments for bagel2 bf subcommand
              pr:
                type: string
                description: Extra arguments for bagel2 pr subcommand

        required:
          - run
          - custom_gene_lists
          - extra_args

      mageck:
        type: object
        properties:
          run:
            type: boolean
            description: Perform mageck analysis

          command:
            type: string
            enum: [test, mle]
            description: mageck command to run (test or mle)

          mle:
            type: object
            properties:
              design_matrix:
                type: array
                description: Paths to design matrices for mageck mle

          apply_crisprcleanr:
            type: boolean
            description: Apply crisprcleanr to mageck results (recommended for genome-wide libraries)

          extra_mageck_arguments:
            type: string
            description: Extra arguments for mageck

          mageck_control_genes:
            type: string
            description: All or path to file with control genes

          apply_CNV_correction:
            type: boolean
            description: Apply CNV correction to mageck results

          cell_line:
            type: string
            description: Cell line for CNV correction

        required:
          - run
          - extra_mageck_arguments
          - mageck_control_genes
          - apply_CNV_correction
          - cell_line

      drugz:
        type: object
        properties:
          run:
            type: boolean
            description: Perform drugZ analysis

          apply_crisprcleanr:
            type: boolean
            description: Apply crisprcleanr before drugZ analysis

          extra:
            type: string
            description: Extra arguments for drugZ

        required:
          - run
          - extra

      pathway_analysis:
        type: object
        properties:
          run:
            type: boolean
            description: Perform pathway analysis on mageck results

          data:
            type: string
            description: enriched, depleted, or both

          fdr:
            type: number
            minimum: 0
            maximum: 1
            description: FDR threshold for significant genes

          top_genes:
            type: integer
            description: Number of top genes to consider for pathway analysis (overrides fdr, use 0 to disable)

        required:
          - run
          - data
          - fdr
          - top_genes

  ngs_tracker:
    type: object
    properties:
      enabled:
        type: boolean
        description: Set to false to skip NGS Tracker registration
      base_url:
        type: string
        description: NGS Tracker API base URL
      project_id:
        type: integer
        description: Project ID from the NGS Tracker project detail page
      workflow_name:
        type: string
      workflow_tag:
        type: string
      workflow_system:
        type: string
      description:
        type: string
      tags:
        type: array
        items:
          type: string
      files:
        type: array
        items:
          type: object
    required:
      - enabled
      - base_url
      - project_id

required:
  - lib_info
  - csv
  - mismatch
  - stats
